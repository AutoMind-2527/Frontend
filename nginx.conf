server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Transparent Keycloak reverse proxy.
    # Three things are required to keep the browser fully on if210096:
    #   1. proxy_redirect  – rewrites Location: headers on 3xx responses
    #   2. proxy_cookie_domain – rewrites cookie Domain attributes
    #   3. sub_filter – rewrites if220129 hostnames in HTML/CSS/JS bodies
    # Together these ensure AUTH_SESSION_ID is stored under if210096 (no
    # "Cookie not found"), CSS/fonts load (styled form), and the JS token
    # exchange is same-origin (no CORS).
    # ^~ gives this prefix location priority over regex locations below,
    # so /keycloak/*.css, *.js, *.woff2 etc. are proxied here instead of
    # being intercepted by the static-files regex and returning 404.
    location ^~ /keycloak/ {
        proxy_pass https://if220129.cloud.htl-leonding.ac.at/keycloak/;
        proxy_set_header Host              if220129.cloud.htl-leonding.ac.at;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_ssl_server_name on;
        proxy_ssl_verify off;

        # 1. Rewrite Location redirect headers
        proxy_redirect https://if220129.cloud.htl-leonding.ac.at/
                       https://if210096.cloud.htl-leonding.ac.at/;

        # 2. Rewrite cookie Domain so the browser stores them under if210096
        proxy_cookie_domain if220129.cloud.htl-leonding.ac.at
                            if210096.cloud.htl-leonding.ac.at;

        # 3. Disable upstream compression so sub_filter can read the body,
        #    then replace every occurrence of the upstream hostname in responses
        proxy_set_header Accept-Encoding "";
        sub_filter 'if220129.cloud.htl-leonding.ac.at'
                   'if210096.cloud.htl-leonding.ac.at';
        sub_filter_once off;
        sub_filter_types text/html text/css application/javascript
                         text/javascript application/json text/xml;

        proxy_buffer_size       16k;
        proxy_buffers           4 32k;
        proxy_busy_buffers_size 64k;
    }

    # Always revalidate the app shell so new deploys switch to new bundle hashes.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Serve static files directly
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing - send all other requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
